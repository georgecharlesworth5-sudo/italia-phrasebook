<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puglia Phrase Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f7f7;
    --warm-white: #ffffff;
    --terracotta: #222222;
    --terracotta-light: #444444;
    --terracotta-pale: #eeeeee;
    --olive: #555555;
    --olive-light: #777777;
    --midnight: #111111;
    --ink: #222222;
    --stone: #888888;
    --sand: #dddddd;
    --azure: #444444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--midnight);
    color: var(--cream);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(196,97,58,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(46,107,158,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--terracotta-light);
    margin-bottom: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  header h1 {
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.02em;
    line-height: 1.1;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.25s;
  }

  header h1 em {
    font-style: normal;
    color: var(--terracotta-light);
  }

  .header-sub {
    font-size: 1rem;
    color: var(--sand);
    margin-top: 0.75rem;
    font-weight: 300;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.4s;
  }

  .header-rule {
    width: 60px;
    height: 1px;
    background: var(--terracotta);
    margin: 1.5rem auto 0;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.55s;
  }

  /* NAV */
  nav {
    background: var(--warm-white);
    border-bottom: 1px solid var(--sand);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 0 1rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .nav-inner {
    display: flex;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    white-space: nowrap;
  }

  .nav-btn {
    background: none;
    border: none;
    padding: 0.9rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone);
    cursor: pointer;
    transition: color 0.2s, border-bottom 0.2s;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
  }

  .nav-btn:hover { color: var(--terracotta); }
  .nav-btn.active {
    color: var(--terracotta);
    border-bottom-color: var(--terracotta);
  }

  /* MAIN LAYOUT */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* SECTION */
  .section {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .section.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--sand);
  }

  .section-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .section-title {
    font-size: 2rem;
    font-weight: 300;
    font-style: italic;
    color: var(--stone);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--stone);
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  /* SEARCH */
  .search-bar {
    position: relative;
    margin-bottom: 1.75rem;
  }

  .search-bar input {
    width: 100%;
    padding: 0.75rem 1rem 0.75rem 2.5rem;
    border: 1px solid var(--sand);
    border-radius: 4px;
    background: var(--warm-white);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--terracotta); }
  .search-bar input::placeholder { color: var(--stone); }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--stone);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* PHRASE GRID */
  .phrase-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* PHRASE CARD */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--sand);
    border-radius: 6px;
    padding: 1.25rem 1.25rem 1rem;
    cursor: pointer;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--terracotta);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .card:hover {
    border-color: var(--terracotta-pale);
    box-shadow: 0 4px 16px rgba(196,97,58,0.1);
    transform: translateY(-1px);
  }

  .card:hover::before { transform: scaleY(1); }

  .card.flipped { background: var(--midnight); border-color: var(--midnight); }
  .card.flipped::before { background: var(--terracotta-light); transform: scaleY(1); }

  .card-italian {
    font-size: 1.25rem;
    font-style: italic;
    font-weight: 400;
    color: var(--terracotta);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }

  .card.flipped .card-italian { color: var(--terracotta-light); }

  .card-english {
    font-size: 0.95rem;
    color: var(--stone);
    font-weight: 300;
    line-height: 1.4;
    transition: color 0.2s;
  }

  .card.flipped .card-english {
    color: var(--cream);
    font-size: 1rem;
  }

  .card-note {
    margin-top: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--olive-light);
    letter-spacing: 0.05em;
    line-height: 1.5;
  }

  .card.flipped .card-note { color: var(--olive-light); }

  .card-pron {
    margin-top: 0.35rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--sand);
    letter-spacing: 0.04em;
    line-height: 1.5;
  }

  .card.flipped .card-pron { color: var(--stone); }

  .card-pron-loading {
    margin-top: 0.35rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--stone);
    font-style: italic;
  }


    position: absolute;
    top: 0.6rem;
    right: 0.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--sand);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card.flipped .card-flip-hint { color: var(--stone); }

  /* STAR / FAVOURITES */
  .card-star {
    position: absolute;
    top: 0.5rem;
    left: 0.6rem;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0.1rem;
    opacity: 0.25;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 2;
  }
  .card-star:hover { opacity: 0.7; transform: scale(1.2); }
  .card-star.starred { opacity: 1; }
  .card.flipped .card-star { opacity: 0.4; }
  .card.flipped .card-star.starred { opacity: 1; }

  .card-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.4rem;
  }

  .fav-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--stone);
    font-style: italic;
    font-size: 1.1rem;
    line-height: 1.7;
  }

  .fav-empty .fav-empty-star {
    font-size: 2rem;
    display: block;
    margin-bottom: 1rem;
    opacity: 0.3;
  }


  .tag-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .tag-chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--sand);
    border-radius: 20px;
    background: transparent;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.18s;
  }
  .tag-chip:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .tag-chip.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* FOOTER TIP */
  .study-tip {
    margin-top: 2.5rem;
    padding: 1rem 1.25rem;
    background: var(--terracotta-pale);
    border-left: 3px solid var(--terracotta);
    border-radius: 0 4px 4px 0;
    font-size: 0.9rem;
    color: var(--ink);
  }

  .study-tip strong {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terracotta);
    display: block;
    margin-bottom: 0.4rem;
  }

  /* NO RESULTS */
  .no-results {
    text-align: center;
    padding: 3rem;
    color: var(--stone);
    font-style: italic;
    font-size: 1.1rem;
  }

  /* QUIZ */
  .quiz-intro {
    text-align: center;
    padding: 3rem 1rem;
  }
  .quiz-intro p {
    font-size: 1.1rem;
    color: var(--stone);
    margin-bottom: 2rem;
    line-height: 1.7;
  }
  .quiz-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.85rem 2rem;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--warm-white);
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .quiz-btn:hover { background: var(--stone); border-color: var(--stone); }
  .quiz-btn.secondary {
    background: transparent;
    color: var(--ink);
    margin-left: 0.75rem;
  }
  .quiz-btn.secondary:hover { background: var(--terracotta-pale); border-color: var(--stone); }

  .quiz-question {
    background: var(--warm-white);
    border: 1px solid var(--sand);
    border-radius: 6px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    position: relative;
  }
  .quiz-q-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 0.6rem;
  }
  .quiz-italian {
    font-size: 1.4rem;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .quiz-input {
    width: 100%;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--sand);
    border-radius: 4px;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1rem;
    -webkit-text-size-adjust: 100%;
    color: var(--ink);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .quiz-input:focus { border-color: var(--ink); }
  .quiz-input.correct { border-color: #4a7c59; background: #f0f7f2; }
  .quiz-input.incorrect { border-color: #a0392a; background: #fdf2f0; }
  .quiz-input:disabled { cursor: default; }

  .quiz-feedback {
    margin-top: 0.6rem;
    font-size: 0.9rem;
    line-height: 1.5;
    display: none;
  }
  .quiz-feedback.correct { color: #4a7c59; display: block; }
  .quiz-feedback.incorrect { color: #a0392a; display: block; }
  .quiz-feedback .correct-answer { font-style: italic; }

  .skip-btn {
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.35rem 0.85rem;
    border: 1px solid var(--sand);
    border-radius: 4px;
    background: transparent;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.15s;
  }
  .skip-btn:hover { border-color: var(--stone); color: var(--ink); }
  .skip-btn:disabled { opacity: 0.3; cursor: default; }

  .quiz-actions {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .quiz-score-banner {
    text-align: center;
    padding: 2.5rem 1rem 1.5rem;
  }
  .quiz-score-number {
    font-size: clamp(3rem, 10vw, 5rem);
    font-weight: 300;
    font-style: italic;
    color: var(--ink);
    line-height: 1;
  }
  .quiz-score-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    margin-top: 0.5rem;
    margin-bottom: 0.4rem;
  }
  .quiz-score-msg {
    font-size: 1.1rem;
    color: var(--stone);
    font-style: italic;
    margin-bottom: 2rem;
  }
  .quiz-tally {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--stone);
    margin-bottom: 2rem;
  }


  @media (max-width: 600px) {
    /* Header */
    header { padding: 1.5rem 1rem 1.25rem; }
    header h1 { font-size: 2.2rem; }
    .header-sub { font-size: 0.85rem; }
    .header-rule { margin-top: 1rem; }

    /* Nav — larger tap targets */
    .nav-btn {
      font-size: 0.58rem;
      padding: 0.85rem 0.7rem;
      letter-spacing: 0.08em;
    }

    /* Main padding */
    main { padding: 1.5rem 1rem 3rem; }

    /* Section header */
    .section-title { font-size: 1.5rem; }
    .section-count { font-size: 0.6rem; }

    /* Cards — full width, slightly larger text */
    .phrase-grid { grid-template-columns: 1fr; gap: 0.75rem; }
    .card { padding: 1rem 1rem 0.85rem; }
    .card-italian { font-size: 1.2rem; }
    .card-english { font-size: 1rem; }
    .card-pron { font-size: 0.68rem; }
    .card-note { font-size: 0.65rem; }

    /* Search */
    .search-bar input { font-size: 1rem; } /* prevent iOS zoom */

    /* Quiz */
    .quiz-input { font-size: 1rem; } /* prevent iOS zoom — must be ≥16px equivalent */
    .quiz-italian { font-size: 1.2rem; }
    .quiz-q-meta { font-size: 0.62rem; }
    .quiz-score-number { font-size: 3.5rem; }
    .quiz-btn { font-size: 0.65rem; padding: 0.85rem 1.5rem; }
    .quiz-btn.secondary { margin-left: 0; margin-top: 0.5rem; }
    .quiz-actions { flex-direction: column; align-items: center; }
    .skip-btn { font-size: 0.62rem; padding: 0.4rem 1rem; }

    /* Study tip */
    .study-tip { font-size: 0.85rem; }
  }
</style>
</head>

<header>
  <p class="header-label">Puglia · August 2026</p>
  <h1>il mio <em>frasario</em></h1>
  <p class="header-sub">A personal phrase bank for your Italian adventure</p>
  <div class="header-rule"></div>
</header>

<nav>
  <div class="nav-inner" id="navInner"></div>
</nav>

<main id="main"></main>

// ── FAVOURITES ────────────────────────────────────────────────────────────────

let favourites = new Set(JSON.parse(localStorage.getItem('puglia_favs') || '[]'));

function saveFavourites() {
  localStorage.setItem('puglia_favs', JSON.stringify([...favourites]));
}

function getFavKey(sectionId, phraseIt) {
  return `${sectionId}::${phraseIt}`;
}

function toggleFavourite(sectionId, phraseIt, event) {
  event.stopPropagation();
  const key = getFavKey(sectionId, phraseIt);
  if (favourites.has(key)) {
    favourites.delete(key);
  } else {
    favourites.add(key);
  }
  saveFavourites();
  // Update star in DOM without re-rendering whole section
  const grid = document.getElementById('phraseGrid');
  if (grid) {
    grid.querySelectorAll('.card-star').forEach(btn => {
      if (btn.dataset.it === phraseIt && btn.dataset.section === sectionId) {
        btn.classList.toggle('starred', favourites.has(key));
        btn.title = favourites.has(key) ? 'Remove from favourites' : 'Add to favourites';
      }
    });
  }
  // If on favourites page, re-render
  if (currentSection === 'favourites') renderFavourites();
}

function renderFavourites() {
  const main = document.getElementById('main');
  const count = favourites.size;

  const favPhrases = []; // { sectionId, sectionTitle, sectionIcon, phrase, origIdx, pronIdx }
  sections.forEach(sec => {
    sec.phrases.forEach((p, idx) => {
      if (favourites.has(getFavKey(sec.id, p.it))) {
        favPhrases.push({ sectionId: sec.id, sectionTitle: sec.title, sectionIcon: sec.icon, phrase: p, origIdx: idx });
      }
    });
  });

  main.innerHTML = `
    <div class="section active">
      <div class="section-header">
        <span class="section-icon">⭐</span>
        <span class="section-title">Favourites</span>
        <span class="section-count">${count} saved</span>
      </div>
      <div class="phrase-grid" id="phraseGrid">
        ${favPhrases.length ? favPhrases.map((item, i) => renderFavCard(item, i)).join('') : `
          <div class="fav-empty">
            <span class="fav-empty-star">★</span>
            No favourites yet — tap the star on any phrase card to save it here.
          </div>
        `}
      </div>
    </div>
  `;
}

function renderFavCard(item, i) {
  const { sectionId, sectionTitle, sectionIcon, phrase: p, origIdx } = item;
  const key = `fav_${i}`;
  const isFlipped = flipped[key];
  const prons = pronCache[sectionId];
  const pron = prons ? prons[origIdx] : null;
  const pronHTML = isFlipped && pron ? `<div class="card-pron">🔊 ${pron}</div>` : '';
  const favKey = getFavKey(sectionId, p.it);
  return `
    <div class="card ${isFlipped ? 'flipped' : ''}" onclick="flipFavCard(${i})">
      <button class="card-star starred" data-section="${sectionId}" data-it="${p.it.replace(/"/g,'&quot;')}"
        onclick="toggleFavourite('${sectionId}', ${JSON.stringify(p.it)}, event)"
        title="Remove from favourites">★</button>
      <span class="card-flip-hint">${isFlipped ? '↩ back' : 'tap to reveal'}</span>
      <div class="card-section-label">${sectionIcon} ${sectionTitle}</div>
      <div class="card-italian">${p.it}</div>
      <div class="card-english">${isFlipped ? p.en : '···'}</div>
      ${pronHTML}
      ${p.note && isFlipped ? `<div class="card-note">ℹ ${p.note}</div>` : ''}
    </div>
  `;
}

function flipFavCard(i) {
  const key = `fav_${i}`;
  flipped[key] = !flipped[key];
  const grid = document.getElementById('phraseGrid');
  if (!grid) return;
  const cards = grid.querySelectorAll('.card');
  if (!cards[i]) return;

  // Rebuild favourites list to get phrase info
  const favPhrases = [];
  sections.forEach(sec => {
    sec.phrases.forEach((p, idx) => {
      if (favourites.has(getFavKey(sec.id, p.it))) {
        favPhrases.push({ sectionId: sec.id, phrase: p, origIdx: idx });
      }
    });
  });

  const item = favPhrases[i];
  if (!item) return;
  const { sectionId, phrase: p, origIdx } = item;
  const card = cards[i];
  const isFlipped = flipped[key];

  card.className = `card ${isFlipped ? 'flipped' : ''}`;
  card.querySelector('.card-flip-hint').textContent = isFlipped ? '↩ back' : 'tap to reveal';
  card.querySelector('.card-english').textContent = isFlipped ? p.en : '···';

  const existingPron = card.querySelector('.card-pron');
  if (existingPron) existingPron.remove();
  if (isFlipped) {
    const prons = pronCache[sectionId];
    if (prons && prons[origIdx]) {
      const pronEl = document.createElement('div');
      pronEl.className = 'card-pron';
      pronEl.textContent = '🔊 ' + prons[origIdx];
      card.querySelector('.card-english').insertAdjacentElement('afterend', pronEl);
    }
  }

  const noteEl = card.querySelector('.card-note');
  if (isFlipped && p.note) {
    if (!noteEl) {
      const note = document.createElement('div');
      note.className = 'card-note';
      note.textContent = 'ℹ ' + p.note;
      card.appendChild(note);
    }
  } else if (noteEl) {
    noteEl.remove();
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────

function getAllPhrases() {
  const all = [];
  sections.filter(s => s.id !== 'foodbank').forEach(s => s.phrases.forEach(p => all.push(p)));
  return all;
}

function pickRandom(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function normalise(str) {
  return str
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9\s\/]/g, '')
    .replace(/\s*\/\s*/g, ' / ')
    .replace(/\s+/g, ' ')
    .trim();
}

function isAnswerCorrect(userRaw, correctRaw) {
  if (!userRaw || userRaw.trim() === '') return false;
  const user = normalise(userRaw);
  const correct = normalise(correctRaw);

  // Exact full match
  if (user === correct) return true;

  // Match any single alternative (split on " / ")
  const alts = correct.split(' / ').map(a => a.trim());
  return alts.some(alt => {
    if (alt === user) return true;
    if (alt.length > 3 && (alt.includes(user) || user.includes(alt))) return true;
    return false;
  });
}

function scoreMessage(score) {
  if (score === 10) return 'Perfetto! You\'re ready for Puglia.';
  if (score >= 8)  return 'Ottimo! Really impressive.';
  if (score >= 6)  return 'Bene! Solid effort — keep going.';
  if (score >= 4)  return 'Non male. A bit more study needed!';
  return 'Keep practising — you\'ll get there!';
}

            onclick="switchSection('${s.id}')">
      ${s.icon} ${s.title}
    </button>
  `).join('');
}

function switchSection(id) {
  currentSection = id;
  searchQuery = '';
  activeTag = 'all';
  flipped = {};
  buildNav();
  if (id === 'quiz') {
    renderQuizIntro();
  } else if (id === 'favourites') {
    renderFavourites();
    // Pre-load prons for all sections that have favourites
    sections.forEach(sec => {
      if ([...favourites].some(k => k.startsWith(sec.id + '::'))) {
        loadPronunciations(sec.id);
      }
    });
  } else {
    renderSection();
    loadPronunciations(id);
  }
}

      <div class="section-header">
        <span class="section-icon">${sec.icon}</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-count">${visible} / ${total} phrases</span>
      </div>

      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input
          type="text"
          placeholder="Search phrases..."
          value="${searchQuery}"
          oninput="handleSearch(this.value)"
        >
      </div>

      <div class="phrase-grid" id="phraseGrid">
        ${phrases.length ? phrases.map((p, i) => renderCard(p, i)).join('') :
          '<div class="no-results">No phrases match your search.</div>'}
      </div>

      ${sec.tip ? `
        <div class="study-tip">
          <strong>💡 Study Tip</strong>
          ${sec.tip}
        </div>
      ` : ''}
    </div>
  `;
}

function renderCard(p, i) {
  const key = `${currentSection}_${i}`;
  const isFlipped = flipped[key];
  const prons = pronCache[currentSection];
  const pron = prons ? prons[i] : null;
  const pronHTML = isFlipped && pron ? `<div class="card-pron">🔊 ${pron}</div>` : '';
  const favKey = getFavKey(currentSection, p.it);
  const isStarred = favourites.has(favKey);
  return `
    <div class="card ${isFlipped ? 'flipped' : ''}" onclick="flipCard(${i})">
      <button class="card-star ${isStarred ? 'starred' : ''}"
        data-section="${currentSection}" data-it="${p.it.replace(/"/g,'&quot;')}"
        onclick="toggleFavourite('${currentSection}', ${JSON.stringify(p.it)}, event)"
        title="${isStarred ? 'Remove from favourites' : 'Add to favourites'}">★</button>
      <span class="card-flip-hint">${isFlipped ? '↩ back' : 'tap to reveal'}</span>
      <div class="card-italian">${p.it}</div>
      <div class="card-english">${isFlipped ? p.en : '···'}</div>
      ${pronHTML}
      ${p.note && isFlipped ? `<div class="card-note">ℹ ${p.note}</div>` : ''}
    </div>
  `;
}

function flipCard(i) {
  const sec = sections.find(s => s.id === currentSection);
  let phrases = sec.phrases;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    phrases = phrases.filter(p =>
      p.it.toLowerCase().includes(q) ||
      p.en.toLowerCase().includes(q) ||
      (p.note && p.note.toLowerCase().includes(q))
    );
  }
  const p = phrases[i];
  const origIdx = sec.phrases.indexOf(p);
  const key = `${currentSection}_${origIdx}`;
  flipped[key] = !flipped[key];

  const grid = document.getElementById('phraseGrid');
  if (grid) {
    const cards = grid.querySelectorAll('.card');
    if (cards[i]) {
      const card = cards[i];
      const isFlipped = flipped[key];
      card.className = `card ${isFlipped ? 'flipped' : ''}`;
      card.querySelector('.card-flip-hint').textContent = isFlipped ? '↩ back' : 'tap to reveal';
      card.querySelector('.card-english').textContent = isFlipped ? p.en : '···';

      // Pronunciation
      const existingPron = card.querySelector('.card-pron, .card-pron-loading');
      if (existingPron) existingPron.remove();
      if (isFlipped) {
        const prons = pronCache[currentSection];
        const pronEl = document.createElement('div');
        if (prons && prons[origIdx]) {
          pronEl.className = 'card-pron';
          pronEl.textContent = '🔊 ' + prons[origIdx];
          card.querySelector('.card-english').insertAdjacentElement('afterend', pronEl);
        }
      }

      // Note
      const noteEl = card.querySelector('.card-note');
      if (isFlipped && p.note) {
        if (!noteEl) {
          const note = document.createElement('div');
          note.className = 'card-note';
          note.textContent = 'ℹ ' + p.note;
          card.appendChild(note);
        }
      } else if (noteEl) {
        noteEl.remove();
      }
    }
  }
}

function handleSearch(val) {
  searchQuery = val;
  renderSection();
}

// ── QUIZ ─────────────────────────────────────────────────────────────────────

function renderQuizIntro() {
  const total = getAllPhrases().length;
  document.getElementById('main').innerHTML = `
    <div class="section active">
      <div class="section-header">
        <span class="section-icon">✏️</span>
        <span class="section-title">Quiz</span>
      </div>
      <div class="quiz-intro">
        <p>10 random Italian phrases drawn from all ${total} entries across every section.<br>
        Type the English translation for each one. Spelling doesn't have to be perfect — close answers count.</p>
        <button class="quiz-btn" onclick="startQuiz()">Start Quiz</button>
      </div>
    </div>
  `;
}

function startQuiz() {
  quizQuestions = pickRandom(getAllPhrases(), 10);
  quizSubmitted = false;
  renderQuizQuestions();
}

function renderQuizQuestions() {
  const questionsHTML = quizQuestions.map((p, i) => `
    <div class="quiz-question" id="qq-${i}">
      <div class="quiz-q-meta">Question ${i + 1} of 10</div>
      <div class="quiz-italian">${p.it}</div>
      <input
        class="quiz-input"
        type="text"
        id="qi-${i}"
        placeholder="Your answer…"
        autocomplete="off"
        onkeydown="handleQuizKey(event, ${i})"
      >
      <button class="skip-btn" id="qskip-${i}" onclick="skipQuestion(${i})">Skip</button>
      <div class="quiz-feedback" id="qf-${i}"></div>
    </div>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="section active">
      <div class="section-header">
        <span class="section-icon">✏️</span>
        <span class="section-title">Quiz</span>
        <span class="section-count">10 questions</span>
      </div>
      ${questionsHTML}
      <div class="quiz-actions">
        <button class="quiz-btn" onclick="submitQuiz()">Submit Answers</button>
        <button class="quiz-btn secondary" onclick="startQuiz()">New Quiz</button>
      </div>
    </div>
  `;
  document.querySelector('#qq-0 .quiz-input').focus();
}

function skipQuestion(i) {
  const input = document.getElementById(`qi-${i}`);
  const skipBtn = document.getElementById(`qskip-${i}`);
  input.value = '';
  input.disabled = true;
  input.placeholder = 'Skipped';
  skipBtn.style.display = 'none';
  const next = document.getElementById(`qi-${i + 1}`);
  if (next) next.focus();
}

function handleQuizKey(event, i) {
  if (event.key !== 'Enter') return;
  event.preventDefault();
  const next = document.getElementById(`qi-${i + 1}`);
  if (next) {
    next.focus();
  }
}

function submitQuiz() {
  if (quizSubmitted) return;
  quizSubmitted = true;
  let score = 0;

  quizQuestions.forEach((p, i) => {
    const input = document.getElementById(`qi-${i}`);
    const feedback = document.getElementById(`qf-${i}`);
    const skipBtn = document.getElementById(`qskip-${i}`);
    if (skipBtn) skipBtn.style.display = 'none';
    const userAnswer = input.value;
    const isSkipped = input.disabled && input.value === '';
    const isCorrect = !isSkipped && isAnswerCorrect(userAnswer, p.en);

    input.disabled = true;
    if (isCorrect) {
      score++;
      input.classList.add('correct');
      feedback.className = 'quiz-feedback correct';
      feedback.textContent = '✓ Correct';
    } else {
      input.classList.add('incorrect');
      feedback.className = 'quiz-feedback incorrect';
      feedback.innerHTML = `✗ The answer was: <span class="correct-answer">${p.en}</span>`;
    }
  });

  // Scroll to top and show score banner
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const header = document.querySelector('.section-header');
  const banner = document.createElement('div');
  banner.className = 'quiz-score-banner';
  banner.innerHTML = `
    <div class="quiz-score-number">${score}<span style="font-size:0.5em;color:var(--stone);">/10</span></div>
    <div class="quiz-score-label">Your Score</div>
    <div class="quiz-score-msg">${scoreMessage(score)}</div>
    <div class="quiz-tally">${score} correct · ${10 - score} to review</div>
    <button class="quiz-btn" onclick="startQuiz()">Try Again with New Questions</button>
  `;
  header.insertAdjacentElement('afterend', banner);

  // Replace submit button with retry only
  const actions = document.querySelector('.quiz-actions');
  if (actions) actions.remove();
}

// ── INIT ─────────────────────────────────────────────────────────────────────

buildNav();
renderFavourites();
loadPronunciations('essentials');
</script>
